<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Keepa Price Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div>
      <p class="eyebrow">Personal Amazon Price Tracker</p>
      <h1>Keepa Price Dashboard</h1>
      <p class="subtitle">Scans your ASIN list and shows products with price drops.</p>
    </div>
  </header>

  <main class="container">
    <section class="toolbar">
      <div>
        <strong id="dealCount">Loading deals...</strong>
        <p id="updatedAt">Checking data file...</p>
      </div>
      <div class="toolbar-controls">
        <label class="sort-control" for="sortSelect">
          <span>Sort by</span>
          <select id="sortSelect">
            <option value="newest">Newest posted</option>
            <option value="highest-drop">Highest % off</option>
            <option value="highest-30-drop">Highest 30-day drop</option>
            <option value="lowest-price">Lowest current price</option>
          </select>
        </label>
        <input id="searchInput" type="search" placeholder="Search title or ASIN..." />
      </div>
    </section>

    <section id="cards" class="card-grid"></section>

    <section id="emptyState" class="empty" hidden>
      <h2>No price drops found</h2>
      <p>Add more ASINs to <code>asins.csv</code> or lower the minimum drop percent in the workflow settings.</p>
    </section>
  </main>

  <script src="app.js?v=remove-asin-post-20260501-2"></script>
</body>
</html>
