name: Update Keepa Deals

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: keepa-price-dashboard-scan
  cancel-in-progress: false

jobs:
  update-deals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Keepa scanner
        env:
          KEEPA_API_KEY: ${{ secrets.KEEPA_API_KEY }}
          AMAZON_TAG: ${{ secrets.AMAZON_TAG }}
          MIN_DROP_PERCENT: "5"
          KEEPA_DOMAIN_ID: "1"
          SCAN_LIMIT: "225"
          KEEPA_BATCH_SIZE: "50"
          KEEPA_REQUEST_DELAY_SECONDS: "2"
          KEEPA_RATE_LIMIT_WAIT_SECONDS: "70"
          ASIN_CSV_URL: "https://docs.google.com/spreadsheets/d/1_cYo7h2MqZpMb_By1ml6SQKSOwNFfhyQsE1T69UgA84/export?format=csv&gid=1348353739"
        run: python fetch_keepa.py

      - name: Commit updated deals
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Keepa deal data"
          file_pattern: data/deals.json data/scan_state.json
